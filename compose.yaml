services:
  mirrorproxy:
    image: ${MIRRORPROXY_IMAGE:-kudang/mirrorproxy:latest}
    container_name: mirrorproxy
    restart: unless-stopped
    ports:
      - "${MIRRORPROXY_PORT:-3000}:3000"
    environment:
      MIRRORPROXY_PUBLIC_BASE_URL: ${MIRRORPROXY_PUBLIC_BASE_URL:-}
      MIRRORPROXY_TRUSTED_PROXIES: ${MIRRORPROXY_TRUSTED_PROXIES:-127.0.0.1,::1}
      MIRRORPROXY_QUOTA_TIMEZONE: ${MIRRORPROXY_QUOTA_TIMEZONE:-local}
      MIRRORPROXY_ADMIN_PASSWORD: ${MIRRORPROXY_ADMIN_PASSWORD:-}
      MIRRORPROXY_MAVEN_FALLBACKS: ${MIRRORPROXY_MAVEN_FALLBACKS-https://jcenter.bintray.com}
      MIRRORPROXY_OUTBOUND_PROXY_ENABLED: ${MIRRORPROXY_OUTBOUND_PROXY_ENABLED:-false}
      MIRRORPROXY_OUTBOUND_PROXY_URL: ${MIRRORPROXY_OUTBOUND_PROXY_URL:-}
      MIRRORPROXY_OUTBOUND_PROXY_USERNAME: ${MIRRORPROXY_OUTBOUND_PROXY_USERNAME:-}
      MIRRORPROXY_OUTBOUND_PROXY_PASSWORD: ${MIRRORPROXY_OUTBOUND_PROXY_PASSWORD:-}
      MIRRORPROXY_OUTBOUND_PROXY_NO_PROXY: ${MIRRORPROXY_OUTBOUND_PROXY_NO_PROXY:-127.0.0.1,localhost}
      MIRRORPROXY_WEBAUTHN_ENABLED: ${MIRRORPROXY_WEBAUTHN_ENABLED:-false}
      MIRRORPROXY_WEBAUTHN_RP_ID: ${MIRRORPROXY_WEBAUTHN_RP_ID:-}
      MIRRORPROXY_WEBAUTHN_RP_ORIGIN: ${MIRRORPROXY_WEBAUTHN_RP_ORIGIN:-}
      MIRRORPROXY_WEBAUTHN_RP_NAME: ${MIRRORPROXY_WEBAUTHN_RP_NAME:-MirrorProxy}
      MIRRORPROXY_WEBAUTHN_REQUIRE_PASSKEY: ${MIRRORPROXY_WEBAUTHN_REQUIRE_PASSKEY:-false}
      MIRRORPROXY_WEBAUTHN_BREAK_GLASS_USERNAME: ${MIRRORPROXY_WEBAUTHN_BREAK_GLASS_USERNAME:-admin}
      MIRRORPROXY_BASE_DOMAIN: ${MIRRORPROXY_BASE_DOMAIN:-}
      MIRRORPROXY_ACCESS_MODE: ${MIRRORPROXY_ACCESS_MODE:-public}
      MIRRORPROXY_ROUTING_ID_MIN_LENGTH: ${MIRRORPROXY_ROUTING_ID_MIN_LENGTH:-12}
      MIRRORPROXY_ROUTING_ROTATION_COOLDOWN_HOURS: ${MIRRORPROXY_ROUTING_ROTATION_COOLDOWN_HOURS:-24}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.1}
      RUST_LOG: ${RUST_LOG:-mirrorproxy_server=info,tower_http=info}
    volumes:
      - mirrorproxy-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mirrorproxy-data:
