listen_addr = "127.0.0.1:3000"
database_path = "mirrorproxy.sqlite3"
public_base_url = "http://127.0.0.1:3000"
forward_client_authorization = false
enabled_proxies = ["github", "composer", "oci", "npm", "nvm", "opam", "go", "maven", "rubygems", "rustup", "nuget", "cpan", "cran", "hackage", "julia", "luarocks", "clojars", "cocoapods", "pub", "anaconda", "texlive", "winget", "elpa", "nix", "guix", "flatpak", "homebrew", "os", "crates", "pypi"]

[upstreams]
github = "https://github.com"
github_raw = "https://raw.githubusercontent.com"
packagist = "https://repo.packagist.org"
docker_hub = "https://registry-1.docker.io"
ghcr = "https://ghcr.io"
quay = "https://quay.io"
kubernetes = "https://registry.k8s.io"
npm = "https://registry.npmjs.org"
nvm = "https://nodejs.org/dist"
opam = "https://opam.ocaml.org"
go_proxy = "https://proxy.golang.org"
maven = "https://repo.maven.apache.org/maven2"
rubygems = "https://rubygems.org"
rustup = "https://static.rust-lang.org"
nuget = "https://api.nuget.org"
cpan = "https://cpan.metacpan.org"
cran = "https://cloud.r-project.org"
hackage = "https://hackage.haskell.org"
julia = "https://pkg.julialang.org"
luarocks = "https://luarocks.org"
clojars = "https://repo.clojars.org"
cocoapods = "https://cdn.cocoapods.org"
pub_repository = "https://pub.dev"
anaconda = "https://repo.anaconda.com/pkgs"
texlive = "https://mirror.ctan.org/systems/texlive/tlnet"
winget = "https://cdn.winget.microsoft.com"
elpa = "https://elpa.gnu.org/packages"
nix = "https://cache.nixos.org"
guix = "https://ci.guix.gnu.org"
flatpak = "https://dl.flathub.org/repo"
homebrew = "https://ghcr.io/v2/homebrew/core"
alpine = "https://dl-cdn.alpinelinux.org/alpine"
openwrt = "https://downloads.openwrt.org"
termux = "https://packages.termux.dev/apt/termux-main"
debian = "https://deb.debian.org/debian"
ubuntu = "https://archive.ubuntu.com/ubuntu"
fedora = "https://download.fedoraproject.org/pub/fedora/linux"
archlinux = "https://geo.mirror.pkgbuild.com"
opensuse = "https://download.opensuse.org"
void = "https://repo-default.voidlinux.org"
gentoo = "https://distfiles.gentoo.org"
freebsd = "https://pkg.freebsd.org"

additional_os = { kali = "https://http.kali.org/kali", rocky = "https://dl.rockylinux.org/pub/rocky", alma = "https://repo.almalinux.org/almalinux", manjaro = "https://repo.manjaro.org/repo", msys2 = "https://repo.msys2.org", raspios = "https://archive.raspberrypi.com/debian", armbian = "https://apt.armbian.com", openeuler = "https://repo.openeuler.org", anolis = "https://mirrors.openanolis.cn/anolis", deepin = "https://community-packages.deepin.com/deepin", linuxmint = "https://mirrors.edge.kernel.org/linuxmint-packages", solus = "https://cdn.getsol.us/repo", trisquel = "https://archive.trisquel.info/trisquel", linuxlite = "https://repo.linuxliteos.com/linuxlite", ros = "http://packages.ros.org/ros2/ubuntu", netbsd = "https://cdn.netbsd.org", openbsd = "https://cdn.openbsd.org" }
crates_index = "https://index.crates.io"
crates_api = "https://crates.io"
pypi_simple = "https://pypi.org/simple"
pypi_files = "https://files.pythonhosted.org"

[timeout]
request_secs = 60

[rate_limit]
enabled = false
requests_per_minute = 600

[cache]
enabled = false
directory = "mirrorproxy-cache"
max_entry_mb = 8
max_total_mb = 256

[quota]
enabled = false
monthly_gb = 500
timezone = "local"
on_exceeded = "stop_proxy"
request_event_retention_days = 30

# Optional credentials for private upstreams. Keep this file permission-restricted.
# Values are never returned by the admin API or stored in SQLite.
# [upstream_auth.npm]
# username = "service-account"
# password = "replace-with-secret"
#
# [upstream_auth.ghcr]
# bearer_token = "replace-with-token"
