name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build
      - name: Install Chromium for browser tests
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run browser end-to-end tests
        working-directory: web
        run: npm run test:e2e
      - name: Rust format
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --workspace

  client-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - name: Install repository clients
        run: sudo apt-get update && sudo apt-get install -y cabal-install cpanminus luarocks maven r-base
      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Run public client protocol smoke
        env:
          MIRRORPROXY_SMOKE_DOCKER: "1"
        run: ./scripts/smoke-clients.sh
