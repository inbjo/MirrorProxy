name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  client:
    name: Client (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: mirrorproxy-client-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: mirrorproxy-client-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: mirrorproxy-client-x86_64-apple-darwin.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: mirrorproxy-client-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mirrorproxy-client-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
      - name: Build client
        run: cargo build --locked --release -p mirrorproxy-cli --target ${{ matrix.target }}
      - name: Package client
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="mirrorproxy-client-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/mirrorproxy" "$staging/mirrorproxy"
          chmod +x "$staging/mirrorproxy"
          tar -czf "${{ matrix.archive }}" -C "$staging" mirrorproxy
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - name: Package Windows client
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "${{ matrix.archive }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/mirrorproxy.exe" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText("$archive.sha256", "$hash  $archive`n", [Text.Encoding]::ASCII)
      - uses: actions/upload-artifact@v6
        with:
          name: client-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  server:
    name: Server (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: mirrorproxy-server-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: mirrorproxy-server-aarch64-unknown-linux-gnu.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
      - name: Build server
        shell: bash
        run: |
          GIT_COMMIT="${GITHUB_SHA}" \
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          cargo build --locked --release -p mirrorproxy-server --target ${{ matrix.target }}
      - name: Package server
        shell: bash
        run: |
          staging="mirrorproxy-server-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/mirrorproxy-server" "$staging/mirrorproxy-server"
          chmod +x "$staging/mirrorproxy-server"
          tar -czf "${{ matrix.archive }}" -C "$staging" mirrorproxy-server
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - uses: actions/upload-artifact@v6
        with:
          name: server-${{ matrix.target }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  publish:
    needs: [client, server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          path: release-artifacts
      - name: Assemble checksums
        run: |
          find release-artifacts -name '*.sha256' -print0 | sort -z | xargs -0 cat > SHA256SUMS
      - name: Move rolling Nightly tag
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.updateRef({
                owner,
                repo,
                ref: "tags/nightly",
                sha: context.sha,
                force: true,
              });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
              await github.rest.git.createRef({
                owner,
                repo,
                ref: "refs/tags/nightly",
                sha: context.sha,
              });
            }
      - name: Publish versioned release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/**/*
            SHA256SUMS
            scripts/install.sh
            scripts/install.ps1
      - name: Publish rolling Nightly
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: MirrorProxy Nightly
          body: |
            Automated rolling build from `main` at `${{ github.sha }}`.

            Assets are replaced after every push to `main` and by the daily scheduled build.
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/**/*
            SHA256SUMS
            scripts/install.sh
            scripts/install.ps1
