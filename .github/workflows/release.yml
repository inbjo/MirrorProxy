name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mirrorproxy-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: mirrorproxy-linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web console
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Linux binary
        run: |
          cp target/${{ matrix.target }}/release/mirrorproxy ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: release-artifacts
      - name: Assemble checksums
        run: |
          find release-artifacts -name '*.sha256' -print0 | sort -z | xargs -0 cat > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*
            SHA256SUMS
